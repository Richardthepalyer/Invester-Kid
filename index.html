<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invester-Kid</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      color: #38bdf8;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>Invester-Kid 🚀</header>

<div class="container">
  <div class="card">
    <h2>Bitcoin (BTC)</h2>
    <p>Price: $--</p>
    <button>Buy</button>
    <button>Sell</button>
  </div>

  <div class="card">
    <h2>Ethereum (ETH)</h2>
    <p>Price: $--</p>
    <button>Buy</button>
    <button>Sell</button>
  </div>
</div>

</body>
</html>
